<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>rateyourDJ · 你的 AI 音乐 DJ</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
    <script src="https://open.spotify.com/embed/iframe-api/v1" async></script>
  </head>
  <body>
    <div class="ambient ambient-one"></div>
    <div class="ambient ambient-two"></div>

    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">RY</span>
        <span class="brand-text">
          <strong>rateyourDJ</strong>
          <small>你的 AI 音乐 DJ</small>
        </span>
      </div>
      <div class="topbar-right">
        <label class="user-field">
          <span>用户</span>
          <input id="user-id" value="demo-user" autocomplete="off" spellcheck="false" />
        </label>
        <button id="open-collection" type="button" class="ghost-button">
          收藏 <span id="collection-badge" class="badge">0</span>
        </button>
        <span id="status-pill" class="status-pill"><span class="dot"></span> 连接中…</span>
      </div>
    </header>

    <main class="chat-shell">
      <div id="chat-stream" class="chat-stream">
        <div class="welcome" id="welcome">
          <h1>想听点什么？</h1>
          <p>告诉我你的口味，我会推荐歌、附上试听，你点赞、收藏或跳过，我会越来越懂你。</p>
          <div class="suggestion-row" id="suggestion-row">
            <button type="button" class="suggestion" data-q="给我推荐一些最经典的英伦摇滚">最经典的英伦摇滚</button>
            <button type="button" class="suggestion" data-q="想要适合深夜的慵懒爵士">深夜慵懒爵士</button>
            <button type="button" class="suggestion" data-q="有没有像 Radiohead 那样的另类摇滚">像 Radiohead 的另类摇滚</button>
            <button type="button" class="suggestion" data-q="推荐一些适合写代码时听的电子乐">写代码时听的电子乐</button>
          </div>
        </div>
      </div>

      <form id="composer" class="composer" autocomplete="off">
        <input
          id="composer-input"
          type="text"
          placeholder="比如：给我推荐一些最经典的英伦摇滚"
          aria-label="输入你想听的内容"
        />
        <button id="composer-send" type="submit" class="primary-button" aria-label="发送">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path d="M3.4 20.4 21 12 3.4 3.6 3.4 10l12 2-12 2z" fill="currentColor" />
          </svg>
        </button>
      </form>
    </main>

    <div id="drawer-backdrop" class="drawer-backdrop hidden"></div>
    <aside id="collection-drawer" class="drawer hidden" aria-hidden="true">
      <div class="drawer-head">
        <div>
          <p class="drawer-eyebrow">YOUR COLLECTION</p>
          <h2>我的收藏</h2>
        </div>
        <button id="close-collection" type="button" class="icon-button" aria-label="关闭">✕</button>
      </div>
      <div class="drawer-stats">
        <div><strong id="stat-collection">0</strong><span>收藏</span></div>
        <div><strong id="stat-feedback">0</strong><span>反馈</span></div>
        <div><strong id="stat-reward">0.00</strong><span>平均评分</span></div>
      </div>
      <div id="collection-list" class="collection-list">
        <p class="drawer-empty">还没有收藏。点歌曲卡片上的 ♥ 就会出现在这里。</p>
      </div>
    </aside>

    <div id="toast" class="toast hidden"></div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
